    <a
      id="whatsapp-info-cta"
      class="sticky-whatsapp"
      data-whatsapp-button
      data-cta-location="sticky_bottom"
      href="#"
      target="_blank"
      rel="noopener noreferrer"
      >WhatsApp’tan iletişime geçin</a
    >

    <script src="/js/config.js"></script>

    <script src="/js/main.js"></script>
    <script>
      (() => {
        "use strict";
        window.dataLayer = window.dataLayer || [];

        const whatsappButton = document.getElementById("whatsapp-info-cta");
        if (!whatsappButton) {
          console.warn('[Tracking] "#whatsapp-info-cta" bulunamadı.');
          return;
        }

        let lastTrackedAt = 0;

        function createEventId() {
          if (window.crypto && typeof window.crypto.randomUUID === "function") {
            return window.crypto.randomUUID();
          }
          return [
            "wa",
            Date.now(),
            Math.random().toString(36).slice(2, 12),
          ].join("_");
        }

        function getCookie(name) {
          const prefix = encodeURIComponent(name) + "=";
          for (const raw of document.cookie.split(";")) {
            const c = raw.trim();
            if (c.startsWith(prefix))
              return decodeURIComponent(c.slice(prefix.length));
          }
          return "";
        }

        function getFbcValue() {
          const existing = getCookie("_fbc");
          if (existing) return existing;
          const fbclid = new URLSearchParams(window.location.search).get(
            "fbclid",
          );
          if (!fbclid) return "";
          return `fb.1.${Date.now()}.${fbclid}`;
        }

        async function sendMetaServerEvent(eventId, eventTime) {
          try {
            const res = await fetch("/api/meta-capi", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              keepalive: true,
              body: JSON.stringify({
                event_id: eventId,
                event_time: eventTime,
                event_source_url: window.location.href,
                fbp: getCookie("_fbp"),
                fbc: getFbcValue(),
              }),
            });
            if (!res.ok) {
              const err = await res.json().catch(() => ({}));
              console.error("[Meta CAPI] Request failed:", res.status, err);
              return;
            }
            console.info("[Meta CAPI] Event sent:", await res.json());
          } catch (e) {
            console.error("[Meta CAPI] Network error:", e);
          }
        }

        whatsappButton.addEventListener(
          "click",
          () => {
            const now = Date.now();

            if (now - lastTrackedAt < 1500) return;

            lastTrackedAt = now;

            const eventId = createEventId();

            const eventTime = Math.floor(now / 1000);

            window.dataLayer.push({
              event: "whatsapp_click",
              event_id: eventId,
              contact_channel: "whatsapp",
              cta_name: "whatsapp_bilgi_al",
              site_area: "magazamiz_landing",
            });

            void sendMetaServerEvent(eventId, eventTime);
          },
          { capture: true },
        );
      })();
    </script>
